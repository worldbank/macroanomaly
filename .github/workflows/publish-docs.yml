name: Publish docs

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - ".github/workflows/publish-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX
        run: quarto install tinytex

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages for Quarto
        run: Rscript -e 'install.packages(c("knitr", "rmarkdown"))'

      - name: Render Quarto book
        working-directory: docs
        run: quarto render

      - name: Ensure PDF is at stable filename
        working-directory: docs
        run: |
          if [ -f _site/manual.pdf ]; then
            echo "PDF already at _site/manual.pdf"
          else
            pdf=$(find _site -maxdepth 1 -name '*.pdf' | head -1)
            if [ -n "$pdf" ]; then
              cp "$pdf" _site/manual.pdf
              echo "Published PDF at _site/manual.pdf (from $pdf)"
            else
              echo "No PDF found in _site" >&2
              exit 1
            fi
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
